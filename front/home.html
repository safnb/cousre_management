<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Главная | Course Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>📚 Личный кабинет</h2>
    <p class="welcome-text">Добро пожаловать в систему управления курсами</p>

    <div class="user-info">
      <div class="user-avatar" id="avatar">👤</div>
      <div class="user-details">
        <h3 id="userName">Студент</h3>
        <p id="userEmail">email@example.com</p>
      </div>
    </div>

    <div class="nav-grid">
      <div class="nav-card courses" onclick="navigateTo('courses.html')">
        <span class="nav-icon">📖</span>
        <div class="nav-label">Мои курсы</div>
        <div class="nav-sublabel">Просмотр и запись</div>
      </div>
      <div class="nav-card lessons" onclick="navigateTo('lessons.html')">
        <span class="nav-icon">📅</span>
        <div class="nav-label">Занятия</div>
        <div class="nav-sublabel">Расписание и темы</div>
      </div>
      <div class="nav-card grades" onclick="navigateTo('grades.html')">
        <span class="nav-icon">⭐</span>
        <div class="nav-label">Оценки</div>
        <div class="nav-sublabel">Успеваемость</div>
      </div>
      <div class="nav-card schedule" onclick="navigateTo('registrations.html')">
        <span class="nav-icon">📝</span>
        <div class="nav-label">Записи</div>
        <div class="nav-sublabel">Запись на курсы</div>
      </div>
      <div class="nav-card profile" onclick="navigateTo('profile.html')">
        <span class="nav-icon">👤</span>
        <div class="nav-label">Профиль</div>
        <div class="nav-sublabel">Мои данные</div>
      </div>
      <div class="nav-card materials" onclick="navigateTo('materials.html')">
        <span class="nav-icon">📁</span>
        <div class="nav-label">Материалы</div>
        <div class="nav-sublabel">Файлы курсов</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card purple">
        <div class="stat-number" id="coursesCount">—</div>
        <div class="stat-label">Курсов</div>
      </div>
      <div class="stat-card pink">
        <div class="stat-number" id="lessonsCount">—</div>
        <div class="stat-label">Занятий</div>
      </div>
      <div class="stat-card green">
        <div class="stat-number" id="avgGrade">—</div>
        <div class="stat-label">Средний балл</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-number" id="userClass">—</div>
        <div class="stat-label">Класс</div>
      </div>
    </div>

    <button class="logout" onclick="logout()">
      🚪 Выйти из аккаунта
    </button>
  </div>

  <script src="api.js"></script>
  <script>
    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");
    if (!token) window.location.href = "login.html";

    function navigateTo(page) {
      window.location.href = page;
    }

    async function loadDashboard() {
      try {
        const userRes = await fetch(`${BASE_URL}/api/users/${userId}`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        if (userRes.ok) {
          const user = await userRes.json();
          document.getElementById("userName").textContent = user.ФИО || 'Студент';
          document.getElementById("userEmail").textContent = user.email || '';
          document.getElementById("userClass").textContent = user.Класс || '—';
          if (user.ФИО) {
            const initials = user.ФИО.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById("avatar").textContent = initials || '👤';
          }
        }

        try {
          const regRes = await fetch(`${BASE_URL}/api/registrations`, {
            headers: { "Authorization": `Bearer ${token}` }
          });
          if (regRes.ok) {
            const regs = await regRes.json();
            document.getElementById("coursesCount").textContent = regs.length || 0;
          }
        } catch (e) { document.getElementById("coursesCount").textContent = '0'; }

        try {
          const lessonsRes = await fetch(`${BASE_URL}/api/lessons`, {
            headers: { "Authorization": `Bearer ${token}` }
          });
          if (lessonsRes.ok) {
            const lessons = await lessonsRes.json();
            document.getElementById("lessonsCount").textContent = lessons.length || 0;
          }
        } catch (e) { document.getElementById("lessonsCount").textContent = '0'; }

        try {
          const gradesRes = await fetch(`${BASE_URL}/api/grades`, {
            headers: { "Authorization": `Bearer ${token}` }
          });
          if (gradesRes.ok) {
            const grades = await gradesRes.json();
            if (grades.length > 0) {
              const avg = grades.reduce((sum, g) => sum + (Number(g.Оценка) || Number(g.оценка) || 0), 0) / grades.length;
              document.getElementById("avgGrade").textContent = avg.toFixed(1);
            } else {
              document.getElementById("avgGrade").textContent = '—';
            }
          }
        } catch (e) { document.getElementById("avgGrade").textContent = '—'; }

      } catch (err) {
        console.log('Could not load dashboard:', err);
      }
    }

    loadDashboard();

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("userId");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
